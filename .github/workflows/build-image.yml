name: Build & Push Image

on:
  # Merges into prod are the release trigger: build + push (incl. :latest), which
  # ArgoCD Image Updater (digest strategy) auto-rolls into the cluster.
  push:
    branches: [prod]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "deploy/**"
      - ".gitignore"
  # PRs from master -> prod build WITHOUT pushing, to validate the image before merge.
  pull_request:
    branches: [prod]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "deploy/**"
      - ".gitignore"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }} # Rake-Pro/gopaste -> lowercased by metadata-action

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/prod' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
