# gopaste example configuration.
# Values with an env name in the trailing comment can also be set via environment
# variable, which takes precedence (so the deployment's injected secrets stay
# authoritative). Values without an env name are file-only.

host: "0.0.0.0"        # HOST
port: 8080             # PORT
logLevel: "info"       # LOG_LEVEL (debug|info|warn|error)

# Number of trusted reverse proxies in front of the app. The client IP is read
# as the Nth-from-rightmost X-Forwarded-For entry (anything further left is
# client-controllable and ignored). 0 = trust no XFF, use the direct peer.
trustedProxyCount: 0   # TRUSTED_PROXY_COUNT

keyLength: 16          # paste keys are capability URLs; longer = less guessable
maxLength: 157286400   # MAX_LENGTH; bytes (150 MB); 0 disables the limit
staticMaxAge: 86400    # Cache-Control max-age for static assets, seconds

keyGenerator:
  type: "random"       # random | phonetic | dictionary (random recommended)
  path: ""             # word-list path, required only for type: dictionary

rateLimits:
  totalRequests: 500   # per-client requests allowed per window; 0 disables
  every: 60000         # window length, milliseconds
  maxBytes: 629145600  # RATE_LIMIT_MAX_BYTES; accepted paste bytes per client
                       # per window (600 MB); flood control for large pastes; 0 disables

storage:
  type: "postgres"     # STORAGE_TYPE: postgres | sqlite | file

  # --- postgres ---
  # Either set `url` (DATABASE_URL) or the discrete parts below.
  url: ""              # DATABASE_URL, e.g. postgres://user:pass@host:5432/db
  host: ""             # STORAGE_HOST
  port: 5432           # STORAGE_PORT
  db: ""               # STORAGE_DB
  user: ""             # STORAGE_USERNAME
  password: ""         # STORAGE_PASSWORD
  expire: 0            # STORAGE_EXPIRE_SECONDS; 0 = pastes never expire
  expireDays: 0        # STORAGE_EXPIRE_DAYS; convenience, overrides expire when >0
                       # (sliding TTL: postgres/sqlite bump expiry on read)

  # --- sqlite / file ---
  path: ""             # STORAGE_FILEPATH: sqlite db file, or file-store directory

# auth:                  # admin console (disabled by default).
#                        # Gates only /admin; the paste API stays public.
#                        # Setup guide: docs/AUTH.md. Design: docs/DESIGN.md sec 8.
#   mode: disabled       # AUTH_MODE: disabled | oidc | local
#   sessionKey: ""       # AUTH_SESSION_KEY: random >=32 bytes; signs the session cookie
#   oidc:                # mode: oidc - native confidential client + PKCE (S256)
#     issuer: ""         # OIDC_ISSUER: e.g. https://auth.example.com/application/o/gopaste/
#     clientID: ""       # OIDC_CLIENT_ID
#     clientSecret: ""   # OIDC_CLIENT_SECRET
#     redirectURL: ""    # OIDC_REDIRECT_URL: https://<host>/admin/callback
#     postLogoutRedirectURL: "" # OIDC_POST_LOGOUT_REDIRECT_URL: https://<host>/admin/logout
#     adminGroup: ""     # OIDC_ADMIN_GROUP: only members of this group are admitted
#     groupsClaim: groups # OIDC_GROUPS_CLAIM: claim carrying group names
#   local:               # mode: local - for self-hosters without an IdP
#     admins:
#       - username: admin
#         passwordHash: "" # bcrypt, e.g. htpasswd -nbB admin <pw>
